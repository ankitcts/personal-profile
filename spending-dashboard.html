<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spending Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f232c;
    --text: #e7e9ee;
    --muted: #9aa3b2;
    --accent: #6ea8fe;
    --good: #4ade80;
    --warn: #f59e0b;
    --bad: #f87171;
    --border: #2a2f3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, system-ui, sans-serif;
    background: var(--bg); color: var(--text); padding: 24px;
  }
  h1 { margin: 0 0 4px 0; font-size: 22px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip {
    padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); cursor: pointer; font-size: 13px;
  }
  .chip.active { background: var(--accent); color: #0b0d11; border-color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .kpi .value { font-size: 22px; font-weight: 600; margin-top: 6px; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
  }
  .panel h3 { margin: 0 0 12px 0; font-size: 14px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  tr:hover td { background: var(--panel-2); }
  td.amt { text-align: right; font-variant-numeric: tabular-nums; }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--border); font-size: 11px; color: var(--muted);
  }
  .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
  .footer { margin-top: 16px; color: var(--muted); font-size: 12px; }
  canvas { max-height: 340px; }
  .breadcrumb { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .breadcrumb b { color: var(--text); }
  .clear-btn {
    margin-left: 8px; padding: 2px 8px; border-radius: 6px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 11px;
  }
  .error {
    background: #2a1416; border: 1px solid #7f1d1d; color: #fecaca;
    padding: 14px 18px; border-radius: 10px; font-size: 13px;
  }
  .error code { background: rgba(0,0,0,.3); padding: 1px 6px; border-radius: 4px; }
  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .panels { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <h1 id="page-title">Spending Dashboard</h1>
  <div class="sub" id="page-subtitle"></div>

  <div id="config-error" style="display:none;" class="error"></div>

  <div id="dashboard" style="display:none;">
    <div class="toolbar" id="month-filter"></div>

    <div class="grid">
      <div class="kpi"><div class="label">Total spend</div><div class="value" id="kpi-total">$0</div></div>
      <div class="kpi"><div class="label">Transactions</div><div class="value" id="kpi-count">0</div></div>
      <div class="kpi"><div class="label">Top category</div><div class="value" id="kpi-topcat">—</div></div>
      <div class="kpi"><div class="label">Avg per transaction</div><div class="value" id="kpi-avg">$0</div></div>
    </div>

    <div class="panels">
      <div class="panel">
        <h3>Spend by category</h3>
        <canvas id="cat-chart"></canvas>
      </div>
      <div class="panel">
        <h3>Monthly trend</h3>
        <canvas id="trend-chart"></canvas>
      </div>
    </div>

    <div class="panel" style="margin-top: 12px;">
      <h3>Transactions <span id="drill-state"></span></h3>
      <div class="breadcrumb" id="breadcrumb"></div>
      <table>
        <thead><tr><th>Date</th><th>Merchant</th><th>Category</th><th class="amt">Amount</th></tr></thead>
        <tbody id="tx-body"></tbody>
      </table>
    </div>

    <div class="footer">
      Data is loaded from <code>data/data.js</code>. See <a href="README.md" style="color:var(--accent);">README</a> for the schema and how to customize.
    </div>
  </div>

<script src="data/data.js"></script>
<script>
(function () {
  // ---- Config validation -------------------------------------------------
  const errorBox = document.getElementById("config-error");
  const dashboardEl = document.getElementById("dashboard");
  function fail(msg) {
    errorBox.innerHTML = msg;
    errorBox.style.display = "block";
    dashboardEl.style.display = "none";
    throw new Error(msg.replace(/<[^>]+>/g, ""));
  }
  if (typeof window.TRANSACTIONS === "undefined") {
    fail("No data loaded. Create <code>data/data.js</code> based on <code>data/data.example.js</code>. See README.");
  }
  if (!Array.isArray(window.TRANSACTIONS) || !window.TRANSACTIONS.length) {
    fail("<code>window.TRANSACTIONS</code> is empty. Add at least one entry to <code>data/data.js</code>.");
  }
  const CFG = window.DASHBOARD_CONFIG || {};
  const CATEGORY_COLORS = window.CATEGORIES || {};
  const TX = window.TRANSACTIONS;
  const CURRENCY = CFG.currency || "USD";
  const DEFAULT_COLOR = "#6ea8fe";

  // ---- Title / subtitle / months ----------------------------------------
  document.title = CFG.title || "Spending Dashboard";
  document.getElementById("page-title").textContent = CFG.title || "Spending Dashboard";
  const subBits = [];
  if (CFG.subtitle) subBits.push(CFG.subtitle);
  if (CFG.windowLabel) subBits.unshift(CFG.windowLabel);
  document.getElementById("page-subtitle").textContent = subBits.join(" · ");

  const monthsFromData = Array.from(new Set(TX.map(t => t.date.slice(0, 7)))).sort();
  const MONTHS = (CFG.months && CFG.months.length) ? CFG.months : monthsFromData;

  // ---- Helpers ----------------------------------------------------------
  const monthLabel = key => {
    const [y, m] = key.split("-").map(Number);
    return new Date(y, m - 1, 1).toLocaleString(undefined, { month: "short", year: "2-digit" });
  };
  const fmt = n => {
    try {
      return new Intl.NumberFormat(undefined, { style: "currency", currency: CURRENCY, maximumFractionDigits: 2 }).format(n);
    } catch (_) {
      return (n < 0 ? "-$" : "$") + Math.abs(n).toFixed(2);
    }
  };
  const colorFor = cat => CATEGORY_COLORS[cat] || DEFAULT_COLOR;

  // ---- Render month chips -----------------------------------------------
  const filterEl = document.getElementById("month-filter");
  filterEl.innerHTML = `<button class="chip active" data-month="all">All months</button>` +
    MONTHS.map(m => `<button class="chip" data-month="${m}">${monthLabel(m)}</button>`).join("");

  const state = { month: "all", category: null };

  function filteredByMonth() {
    return state.month === "all" ? TX : TX.filter(t => t.date.slice(0, 7) === state.month);
  }
  function filteredAll() {
    let rows = filteredByMonth();
    if (state.category) rows = rows.filter(t => t.category === state.category);
    return rows;
  }
  function aggregateByCategory(rows) {
    const map = {};
    for (const t of rows) map[t.category] = (map[t.category] || 0) + t.amount;
    return Object.entries(map).filter(([_, v]) => v !== 0).sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]));
  }
  function aggregateByMonth(rows) {
    const map = {};
    for (const t of rows) {
      const k = t.date.slice(0, 7);
      map[k] = (map[k] || 0) + t.amount;
    }
    return MONTHS.map(k => [k, map[k] || 0]);
  }

  let catChart, trendChart;

  function renderKPIs() {
    const rows = filteredByMonth();
    const total = rows.reduce((s, t) => s + t.amount, 0);
    document.getElementById("kpi-total").textContent = fmt(total);
    document.getElementById("kpi-count").textContent = rows.length;
    const agg = aggregateByCategory(rows);
    document.getElementById("kpi-topcat").textContent = agg[0] ? `${agg[0][0]} (${fmt(agg[0][1])})` : "—";
    const counted = rows.filter(t => t.amount !== 0);
    document.getElementById("kpi-avg").textContent = counted.length ? fmt(total / counted.length) : fmt(0);
  }

  function renderCategoryChart() {
    const agg = aggregateByCategory(filteredByMonth());
    const labels = agg.map(([k]) => k);
    const data = agg.map(([_, v]) => Math.abs(v));
    const colors = labels.map(colorFor);
    const ctx = document.getElementById("cat-chart");
    if (catChart) catChart.destroy();
    catChart = new Chart(ctx, {
      type: "doughnut",
      data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: "#171a21", borderWidth: 2 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: "right", labels: { color: "#e7e9ee", font: { size: 12 } } },
          tooltip: { callbacks: { label: c => `${c.label}: ${fmt(c.parsed)}` } },
        },
        onClick: (_, els) => {
          if (!els.length) return;
          const cat = labels[els[0].index];
          state.category = state.category === cat ? null : cat;
          renderTable();
          renderTrendChart();
        },
      },
    });
  }

  function renderTrendChart() {
    const rows = state.category ? TX.filter(t => t.category === state.category) : TX;
    const agg = aggregateByMonth(rows);
    const labels = agg.map(([k]) => monthLabel(k));
    const data = agg.map(([_, v]) => v);
    const ctx = document.getElementById("trend-chart");
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, {
      type: "bar",
      data: { labels, datasets: [{ label: "Spend", data, backgroundColor: "#6ea8fe", borderRadius: 6 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmt(c.parsed.y) } } },
        scales: {
          x: { ticks: { color: "#9aa3b2" }, grid: { display: false } },
          y: { ticks: { color: "#9aa3b2", callback: v => fmt(v) }, grid: { color: "#2a2f3a" } },
        },
      },
    });
  }

  function renderTable() {
    const rows = filteredAll().slice().sort((a, b) => b.date.localeCompare(a.date));
    const tbody = document.getElementById("tx-body");
    document.getElementById("drill-state").textContent = state.category ? `· filtered: ${state.category}` : "";
    document.getElementById("breadcrumb").innerHTML = state.category
      ? `Drill: <b>${state.category}</b> <button class="clear-btn" id="clear-drill">clear</button>`
      : "";
    const clearBtn = document.getElementById("clear-drill");
    if (clearBtn) clearBtn.onclick = () => { state.category = null; renderTable(); renderTrendChart(); };
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty">No transactions for this filter.</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(t => {
      const amt = t.amount === 0 ? `<span class="pill">no amount</span>` : fmt(t.amount);
      const noteHtml = t.note ? `<div class="pill" style="margin-top:4px;">${t.note}</div>` : "";
      const color = colorFor(t.category);
      return `<tr>
        <td>${t.date}</td>
        <td>${t.merchant}${noteHtml}</td>
        <td><span class="pill" style="border-color:${color};color:${color};">${t.category}</span></td>
        <td class="amt">${amt}</td>
      </tr>`;
    }).join("");
  }

  function rerender() { renderKPIs(); renderCategoryChart(); renderTrendChart(); renderTable(); }

  filterEl.addEventListener("click", e => {
    if (e.target.tagName !== "BUTTON") return;
    document.querySelectorAll("#month-filter .chip").forEach(c => c.classList.remove("active"));
    e.target.classList.add("active");
    state.month = e.target.dataset.month;
    state.category = null;
    rerender();
  });

  dashboardEl.style.display = "";
  rerender();
})();
</script>
</body>
</html>
